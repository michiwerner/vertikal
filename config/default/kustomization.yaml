# Adds namespace to all resources.
namespace: vertikal-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: vertikal-

# Labels to add to all resources and selectors.
commonLabels:
  app.kubernetes.io/name: vertikal
  app.kubernetes.io/instance: vertikal
  app.kubernetes.io/part-of: vertikal
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/created-by: vertikal

resources:
- namespace.yaml
- ../crd
- ../rbac
- ../manager

# Uncomment the following patches if you need to enable additional features
