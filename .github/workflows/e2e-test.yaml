name: E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [basic, scaling, deletion, go]
    steps:
    - uses: actions/checkout@v3

    - name: Fix script permissions
      run: |
        chmod +x test/e2e/scripts/*.sh

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: |
        go mod download
        
    - name: Install kind and kubectl
      run: |
        # Install kind
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        
        # Install kubectl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl

    - name: Build Docker image for kind
      run: |
        # Build the controller image using the dedicated script
        make e2e-build-image
      env:
        CONTROLLER_IMAGE: controller:e2e-${{ github.sha }}
        FORCE_REBUILD: true

    - name: Setup e2e cluster
      run: |
        make e2e-setup
      env:
        CONTROLLER_IMAGE: controller:e2e-${{ github.sha }}    - name: Run e2e test - ${{ matrix.test-type }}
      run: |
        make e2e-test-${{ matrix.test-type }}
      env:
        CONTROLLER_IMAGE: controller:e2e-${{ github.sha }}

    - name: Teardown e2e cluster
      if: always()
      run: |
        make e2e-teardown

  e2e-full-suite:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Fix script permissions
      run: |
        chmod +x test/e2e/scripts/*.sh

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: |
        go mod download
        
    - name: Install kind and kubectl
      run: |
        # Install kind
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        
        # Install kubectl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl

    - name: Build Docker image for kind
      run: |
        # Build the controller image using the dedicated script
        make e2e-build-image
      env:
        CONTROLLER_IMAGE: controller:e2e-${{ github.sha }}
        FORCE_REBUILD: true

    - name: Run complete e2e suite
      run: |
        make e2e-suite
      env:
        CONTROLLER_IMAGE: controller:e2e-${{ github.sha }}